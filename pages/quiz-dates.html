<div class="quiz-page">

  </div>

  <div class="quiz-body">
    <div class="difficulty-bar">
      <button class="diff-btn active" id="btn-beginner" onclick="setDifficulty('beginner',this)">Beginner</button>
      <button class="diff-btn" id="btn-intermediate" onclick="setDifficulty('intermediate',this)">Intermediate</button>
      <button class="diff-btn" id="btn-expert" onclick="setDifficulty('expert',this)">Expert</button>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="stat-box"><div class="label">Card</div><div class="value" id="card">1/20</div></div>
      <div class="stat-box"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div id="quizArea" style="width:100%;display:flex;flex-direction:column;align-items:center;">
      <div class="category-tag" id="categoryTag">Days of the Week</div>
      <div class="question-card">
        <div class="q-prompt">What is this in Vietnamese?</div>
        <div class="q-text" id="qText">Monday</div>
        <div class="q-sub" id="qSub"></div>
        <div class="q-instruction">Select the correct Vietnamese translation:</div>
      </div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>

    <div class="results-screen" id="results">
      <div class="results-title">🎉 Round Complete!</div>
      <div class="results-score" id="finalScore">0/20</div>
      <div class="results-msg" id="resultsMsg"></div>
      <button class="btn btn-primary" onclick="restartQuiz()">Play Again</button>
    </div>
  </div>
</div>

  const isMobile = window.innerWidth < 768 || /Mobi|Android/i.test(navigator.userAgent);
  if (isMobile) { window.location.href = url; } else { window.open(url, '_blank'); }
}

let difficulty = 'beginner', questions = [], current = 0, score = 0, streak = 0, answered = false;
const TOTAL = 20;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function setDifficulty(d, btn) {
  if (checkPaywall(d)) { showPaywall(d === 'intermediate' ? 'intermediate' : 'expert', 'quiz-dates'); return; }
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restartQuiz();
}

function restartQuiz() {
  current = 0; score = 0; streak = 0; answered = false;
  questions = shuffle(data[difficulty]).slice(0, TOTAL);
  document.getElementById('results').classList.remove('visible');
  document.getElementById('quizArea').style.display = 'flex';
  updateStats(); renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('categoryTag').textContent = q.cat;
  document.getElementById('qText').textContent = q.en;
  document.getElementById('qSub').textContent = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').classList.remove('visible');
  const choices = shuffle([q.vn, ...q.d.slice(0,3)]);
  const container = document.getElementById('answers');
  container.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c;
    btn.onclick = () => handleAnswer(btn, c, q.vn);
    container.appendChild(btn);
  });
  updateStats();
}

function handleAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.answer-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if (selected === correct) {
    score++; streak++;
    btn.classList.add('correct');
    fb.textContent = streak >= 3 ? `🔥 Correct! ${streak} in a row!` : '✓ Correct!';
    fb.className = 'feedback correct';
  } else {
    streak = 0;
    btn.classList.add('wrong');
    fb.textContent = `✗ The answer is: ${correct}`;
    fb.className = 'feedback wrong';
  }
  updateStats();
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= TOTAL) showResults();
  else renderQuestion();
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('card').textContent = `${Math.min(current+1,TOTAL)}/${TOTAL}`;
  document.getElementById('streak').textContent = streak;
  document.getElementById('progress').style.width = `${(current/TOTAL)*100}%`;
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('results').classList.add('visible');
  document.getElementById('finalScore').textContent = `${score}/${TOTAL}`;
  const pct = score/TOTAL;
  const msgs = [
    [1, '🏆 Perfect! Xuất sắc lắm! (Outstanding!)'],
    [0.8, '🌟 Giỏi lắm! (Very good!) Keep it up!'],
    [0.6, '👍 Khá tốt! (Pretty good!) Almost there!'],
    [0, 'Keep practicing! Bạn sẽ tiến bộ! (You will improve!)']
  ];
  document.getElementById('resultsMsg').textContent = msgs.find(([t]) => pct >= t)[1];
}

document.addEventListener('DOMContentLoaded', restartQuiz);
</script>
